name: '[App] Build, Test & Deploy'

on:
  push:
    branches: [main]

env:
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - run: ./gradlew :app:server:build :app:server:test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install OCI CLI
      run: pip install oci-cli -q

    - name: Get Cluster OCID
      id: tf_output
      run: |
        OCID=$(oci ce cluster list \
          --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
          --name "oke-infrastructure" \
          --lifecycle-state ACTIVE \
          | jq -r '.data[0].id')
        echo "cluster_id=$OCID" >> $GITHUB_OUTPUT

    - name: Build server distribution
      run: ./gradlew :app:server:installDist --no-daemon

    - name: Create OCIR repository (if missing)
      run: |
        oci artifacts container repository create \
          --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
          --display-name "demo-server" \
          --is-public false || echo "Repository already exists — continuing"

    - name: Derive OCIR config and log in
      run: |
        NAMESPACE=$(oci os ns get | jq -r '.data')
        REGION_KEY=$(oci iam region list | jq -r '.data[] | select(.name=="'"$OCI_CLI_REGION"'") | .key' | tr '[:upper:]' '[:lower:]')
        echo "${{ secrets.OCI_AUTH_TOKEN }}" | \
          docker login -u "${NAMESPACE}/${{ secrets.OCIR_USER_NAME }}" \
            --password-stdin "${REGION_KEY}.ocir.io"
        echo "REGISTRY=${REGION_KEY}.ocir.io" >> $GITHUB_ENV
        echo "REPO=${NAMESPACE}/demo-server" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: app/server/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.REPO }}:latest
        platforms: linux/arm64
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO }}:buildcache,mode=max

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        oci ce cluster create-kubeconfig \
          --cluster-id ${{ steps.tf_output.outputs.cluster_id }} \
          --file $HOME/.kube/config \
          --region ${{ secrets.OCI_REGION }} \
          --token-version 2.0.0

    - name: Verify cluster access
      run: kubectl get nodes

    - name: Deploy to OKE
      run: |
        sed "s|oci-registry/demo-server:latest|${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }}|g" \
          infrastructure/k8s/app/deployment.yaml | kubectl apply -f -
        kubectl apply -f infrastructure/k8s/app/service.yaml

    - name: Wait for rollout
      run: kubectl rollout status deployment/demo-server --timeout=180s

    - name: Show service endpoint
      run: |
        echo "Waiting for LoadBalancer IP..."
        kubectl wait --for=condition=ready svc/demo-server --timeout=120s 2>/dev/null || true
        kubectl get svc demo-server

    - name: Update Cloudflare DNS
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        LB_IP=$(kubectl get svc demo-server -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        echo "LoadBalancer IP: $LB_IP"

        ZONE_NAME="hineat.com"
        ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id')
        echo "Zone ID: $ZONE_ID"

        DNS_NAME="api.hineat.com"
        EXISTING=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$DNS_NAME" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

        RECORD_ID=$(echo "$EXISTING" | jq -r '.result[0].id // empty')

        if [ -n "$RECORD_ID" ]; then
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"$DNS_NAME\",\"content\":\"$LB_IP\",\"ttl\":120,\"proxied\":true}"
          echo "DNS record updated"
        else
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"$DNS_NAME\",\"content\":\"$LB_IP\",\"ttl\":120,\"proxied\":true}"
          echo "DNS record created"
        fi
