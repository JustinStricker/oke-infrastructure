name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true

env:
  OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
  OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
  OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_REGION: ${{ secrets.OCI_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}

jobs:
  destroy:
    name: OpenTofu Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2.0.1
        with:
          tofu_version: 1.12.0

      - name: OpenTofu Init
        run: |
          pip install oci-cli -q
          OCI_NAMESPACE=$(oci os ns get | jq -r '.data')
          tofu init \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"

      - name: OpenTofu Plan Destroy
        run: tofu plan -destroy -no-color -out=tfplan -exclude="oci_objectstorage_bucket.postgres_backups"

      - name: OpenTofu Destroy
        run: tofu apply -auto-approve tfplan -exclude="oci_objectstorage_bucket.postgres_backups"
