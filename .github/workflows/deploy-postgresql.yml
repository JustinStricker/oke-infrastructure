name: Deploy PostgreSQL

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace for PostgreSQL'
        required: true
        default: 'postgres'
        type: string

env:
  OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
  OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
  OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}

jobs:
  deploy:
    name: Deploy CNPG Operator + PostgreSQL Cluster
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2.0.1
        with:
          tofu_version: 1.12.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: OpenTofu Init
        run: |
          pip install oci-cli -q
          OCI_NAMESPACE=$(oci os ns get | jq -r '.data')
          tofu init \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"

      - name: Get Cluster OCID
        id: tf_output
        run: echo "cluster_id=$(tofu output -raw cluster_id)" >> $GITHUB_OUTPUT

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ steps.tf_output.outputs.cluster_id }} \
            --file $HOME/.kube/config \
            --region ${{ secrets.OCI_REGION }} \
            --token-version 2.0.0

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          kubectl delete clusterrole cert-manager-cainjector cert-manager-controller cert-manager-webhook --ignore-not-found
          kubectl delete clusterrolebinding cert-manager-cainjector cert-manager-controller cert-manager-webhook --ignore-not-found
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --wait \
            --timeout 3m

      - name: Ensure cnpg-system namespace is clean
        run: |
          if kubectl get namespace cnpg-system &>/dev/null 2>&1; then
            echo "Cleaning up residual state from prior run..."
            chmod +x scripts/cleanup-cnpg.sh
            ./scripts/cleanup-cnpg.sh ${{ github.event.inputs.namespace }}
          fi

      - name: Install Barman Cloud Plugin
        run: |
          kubectl create namespace cnpg-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f https://github.com/cloudnative-pg/plugin-barman-cloud/releases/download/v0.12.0/manifest.yaml
          kubectl rollout status deployment -n cnpg-system barman-cloud --timeout=120s

      - name: Install CNPG Operator
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Install OCI Block Volume CSI Driver
        run: |
          oci ce cluster addon install --addon-name oci-bv-csi-driver \
            --cluster-id ${{ steps.tf_output.outputs.cluster_id }} \
            --is-permanently-enabled true \
            --region ${{ secrets.OCI_REGION }} \
            --wait-for-work-request || \
          oci ce cluster addon update --addon-name oci-bv-csi-driver \
            --cluster-id ${{ steps.tf_output.outputs.cluster_id }} \
            --is-permanently-enabled true \
            --region ${{ secrets.OCI_REGION }} \
            --wait-for-work-request

      - name: Verify StorageClass
        run: kubectl get storageclass oci-bv

      - name: Deploy PostgreSQL Cluster
        run: |
          kubectl create namespace ${{ github.event.inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/postgres/cluster.yaml -n ${{ github.event.inputs.namespace }}
          kubectl wait --for=condition=Ready \
            cluster/postgres-cluster \
            -n ${{ github.event.inputs.namespace }} \
            --timeout=300s

      - name: Configure Backups
        run: |
          chmod +x scripts/setup-backup.sh
          ./scripts/setup-backup.sh \
            ${{ github.event.inputs.namespace }} \
            ${{ secrets.OCI_REGION }}

      - name: Show PostgreSQL status
        if: success()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ github.event.inputs.namespace }}
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ github.event.inputs.namespace }}

      - name: Cleanup on failure
        if: always() && (failure() || cancelled())
        run: |
          echo "=== Cleaning up after failed/cancelled deployment ==="
          chmod +x scripts/cleanup-cnpg.sh
          ./scripts/cleanup-cnpg.sh "${{ github.event.inputs.namespace }}"