name: '[Web] Build & Deploy to Cloudflare Pages'

on:
  push:
    branches: [main]
    paths:
      - 'app/composeApp/**'
      - 'app/shared/**'
      - 'gradle/**'
      - '.github/workflows/web-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build web client (Wasm/JS)
        run: ./gradlew :app:composeApp:wasmJsBrowserDistribution --no-daemon

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/composeApp/build/dist/wasmJs/productionExecutable/ --project-name=notable-web
