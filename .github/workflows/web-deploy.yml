name: '[Web] Build & Deploy to Cloudflare Pages'

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build web client (Wasm/JS)
        run: ./gradlew :app:composeApp:wasmJsBrowserDistribution --no-daemon

      - name: Create Cloudflare Pages project (if not exists)
        run: |
          OUTPUT=$(npx wrangler pages project create notable-web \
            --production-branch main 2>&1) || true
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Project already exists, continuing..."
          elif echo "$OUTPUT" | grep -qi "error"; then
            echo "FAILED: $OUTPUT"
            exit 1
          else
            echo "$OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/composeApp/build/dist/wasmJs/productionExecutable/ --project-name=notable-web

      - name: Configure Pages custom domain
        run: |
          OUTPUT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/notable-web/domains" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -d '{"name": "notable.hineat.com"}' 2>&1) || true
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Custom domain already exists, continuing..."
          elif echo "$OUTPUT" | grep -qi "error"; then
            echo "FAILED: $OUTPUT"
            exit 1
          else
            echo "$OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
