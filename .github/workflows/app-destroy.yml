name: '[App] Destroy'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy app-ci" to confirm'
        required: true

env:
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy app-ci'

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install OCI CLI
      run: pip install oci-cli -q

    - name: Get Cluster OCID
      id: cluster
      run: |
        OCID=$(oci ce cluster list \
          --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
          --name "oke-infrastructure" \
          --lifecycle-state ACTIVE \
          | jq -r '.data[0].id')
        echo "cluster_id=$OCID" >> $GITHUB_OUTPUT

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        oci ce cluster create-kubeconfig \
          --cluster-id ${{ steps.cluster.outputs.cluster_id }} \
          --file $HOME/.kube/config \
          --region ${{ secrets.OCI_REGION }} \
          --token-version 2.0.0

    - name: Delete Kubernetes resources
      run: |
        kubectl delete deployment demo-server --ignore-not-found
        kubectl delete svc demo-server --ignore-not-found
        kubectl delete pvc demo-server-data --ignore-not-found

    - name: Verify deletion
      run: |
        echo "=== Remaining resources ==="
        for resource in deployment/demo-server svc/demo-server pvc/demo-server-data; do
          if kubectl get "$resource" &>/dev/null 2>&1; then
            echo "  $resource — still present"
          else
            echo "  $resource — gone"
          fi
        done
