name: '[Postgres] Destroy'

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace containing PostgreSQL'
        required: true
        default: 'postgres'
        type: string
      confirm:
        description: 'Type "destroy postgres" to confirm'
        required: true

env:
  OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
  OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
  OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}

jobs:
  destroy:
    name: Destroy PostgreSQL Cluster
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy postgres'

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2.0.1
        with:
          tofu_version: 1.12.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: OpenTofu Init
        working-directory: infrastructure
        run: |
          pip install oci-cli -q
          OCI_NAMESPACE=$(oci os ns get | jq -r '.data')
          tofu init \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"

      - name: Get Cluster OCID from OpenTofu
        id: tf_output
        working-directory: infrastructure
        run: |
          CLUSTER_ID=$(tofu output -raw cluster_id)
          echo "cluster_id=$CLUSTER_ID" >> $GITHUB_OUTPUT

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ steps.tf_output.outputs.cluster_id }} \
            --file $HOME/.kube/config \
            --region ${{ secrets.OCI_REGION }} \
            --token-version 2.0.0

      - name: Delete PostgreSQL + CNPG + cert-manager
        run: |
          chmod +x infrastructure/scripts/cleanup-cnpg.sh
          ./infrastructure/scripts/cleanup-cnpg.sh "${{ github.event.inputs.namespace }}"

      - name: Delete OCI Block Volume CSI Driver
        run: |
          CSI_RELEASE="v1.34.0"
          echo "Deleting CSI driver resources..."
          kubectl delete -f https://github.com/oracle/oci-cloud-controller-manager/releases/download/${CSI_RELEASE}/oci-csi-node-rbac.yaml --ignore-not-found 2>/dev/null || true
          kubectl delete -f https://github.com/oracle/oci-cloud-controller-manager/releases/download/${CSI_RELEASE}/oci-csi-controller-driver.yaml --ignore-not-found 2>/dev/null || true
          kubectl delete -f https://github.com/oracle/oci-cloud-controller-manager/releases/download/${CSI_RELEASE}/oci-csi-node-driver.yaml --ignore-not-found 2>/dev/null || true
          kubectl delete -f https://raw.githubusercontent.com/oracle/oci-cloud-controller-manager/master/manifests/container-storage-interface/storage-class.yaml --ignore-not-found 2>/dev/null || true
          kubectl delete secret oci-volume-provisioner -n kube-system --ignore-not-found 2>/dev/null || true

      - name: Verify deletion
        run: |
          echo "=== Remaining pods ==="
          kubectl get pods -n ${{ github.event.inputs.namespace }} 2>/dev/null || echo "(postgres namespace empty or gone)"
          echo ""
          echo "=== Remaining PVCs ==="
          kubectl get pvc -n ${{ github.event.inputs.namespace }} 2>/dev/null || echo "(no PVCs)"
          echo ""
          echo "=== Remaining namespaces ==="
          for ns in ${{ github.event.inputs.namespace }} cnpg-system cert-manager; do
            if kubectl get namespace "$ns" &>/dev/null 2>&1; then
              echo "  $ns — still present"
            else
              echo "  $ns — gone"
            fi
          done
          echo ""
          echo "=== CSI driver pods ==="
          kubectl get pods -n kube-system 2>/dev/null | grep csi || echo "(none)"
          echo ""
          echo "=== StorageClasses ==="
          kubectl get storageclass 2>/dev/null | grep oci-bv || echo "(none)"
