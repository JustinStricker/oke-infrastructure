name: Apply Infrastructure 

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '*.tf'
      - '*.tfvars'
      - '*.tfvars.example'
      - 'scripts/bootstrap-state.sh'
  push:
    branches: [main]
    paths:
      - '*.tf'
      - '*.tfvars'
      - '*.tfvars.example'
      - 'scripts/bootstrap-state.sh'

env:
  OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
  OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
  OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_REGION: ${{ secrets.OCI_REGION }}
  OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
  OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
  OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
  OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
  OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}

jobs:
  deploy:
    name: OpenTofu Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: opentofu/setup-opentofu@v2.0.1
        with:
          tofu_version: 1.12.0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: OpenTofu Init
        run: |
          pip install oci-cli -q
          OCI_NAMESPACE=$(oci os ns get | jq -r '.data')
          tofu init \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=https://${OCI_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"

      - name: OpenTofu Format
        run: tofu fmt -check -diff -no-color
        continue-on-error: false

      - name: OpenTofu Validate
        run: tofu validate -no-color

      - name: OpenTofu Plan
        run: tofu plan -no-color -out=tfplan

      - name: Backup state before apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: tofu state pull > ".terraform.tfstate.$(date +%s).backup"
        continue-on-error: true

      - name: Import existing bucket into state
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          NAMESPACE=$(oci os ns get | jq -r '.data')
          BUCKET="oke-postgres-backups-oke-infrastructure"
          IMPORT_ID="n/${NAMESPACE}/b/${BUCKET}"
          if oci os bucket get --namespace "${NAMESPACE}" --bucket-name "${BUCKET}" &>/dev/null; then
            if ! tofu state list 2>/dev/null | grep -q "oci_objectstorage_bucket.postgres_backups"; then
              echo "Bucket exists in OCI but not in state. Importing..."
              tofu import oci_objectstorage_bucket.postgres_backups "${IMPORT_ID}"
            else
              echo "Bucket already in state; skipping import."
            fi
          else
            echo "Bucket does not exist in OCI; skipping import."
          fi
        continue-on-error: true

      - name: OpenTofu Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: tofu apply -auto-approve tfplan

      - name: Cleanup on failure
        if: always() && (failure() || cancelled())
        run: |
          echo "=== Cleaning up after failed/cancelled apply ==="
          tofu init -reconfigure \
            -backend-config="region=${OCI_REGION}" \
            -backend-config="endpoint=https://$(oci os ns get | jq -r '.data').compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          tofu plan -destroy -no-color -out=destroy-tfplan \
            -exclude="oci_objectstorage_bucket.postgres_backups"
          tofu apply -auto-approve destroy-tfplan
