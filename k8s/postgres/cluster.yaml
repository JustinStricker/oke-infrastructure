---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres
spec:
  # Single instance for development — scale to 3 for production HA
  instances: 1

  # Use the latest stable PostgreSQL 18 image
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  # Storage configuration
  storage:
    size: 20Gi
    storageClass: oci-bv  # OCI Block Volume CSI storage class

  # Backup configuration using OCI Object Storage (S3-compatible)
  # Prerequisites:
  #   1. Create an OCI Object Storage bucket (done in backup.tf)
  #   2. Generate a customer secret key for S3-compatible API
  #   3. Create a Kubernetes secret with the credentials
  #
  # Uncomment and configure after setting up backup credentials:
  #
  # backup:
  #   barmanObjectStore:
  #     destinationPath: "s3://oke-postgres-backups-oke-infrastructure/"
  #     endpointURL: "https://<namespace>.compat.objectstorage.<region>.oraclecloud.com"
  #     s3Credentials:
  #       accessKeyId:
  #         name: cnpg-s3-creds
  #         key: access-key
  #       secretAccessKey:
  #         name: cnpg-s3-creds
  #         key: secret-key
  #     wal:
  #       compression: gzip
  #   retentionPolicy: "30d"

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  # Resource limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"

  # Node selector — optionally pin to a dedicated node pool with taints
  # nodeSelector:
  #   node-pool: postgres

  # Affinity rules for HA (uncomment when instances > 1)
  # affinity:
  #   enablePodAntiAffinity: true
  #   topologyKey: topology.kubernetes.io/zone